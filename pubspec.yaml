name: campus_park
description: "CampusPark - Smart parking for modern campuses."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.2.7

  # State Management
  provider: ^6.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.2.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
